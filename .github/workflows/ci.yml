---
name: CI Build with tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-java@v4
        name: setup build jdk
        id: build_jdk
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: build code
        id: install_fast
        env:
          MAVEN_ARGS: "-B -ff"
        run: |
          chmod +x ./mvnw
          make install-fast

      - uses: actions/setup-java@v4
        name: setup test jdk
        id: test_jdk
        with:
          java-version: 21
          distribution: temurin

      - name: run tests
        id: run_tests
        env:
          MAVEN_ARGS: "-B -ff"
        run: |
          chmod +x ./mvnw
          make run-tests
